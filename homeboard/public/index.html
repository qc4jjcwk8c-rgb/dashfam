<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeboard – Family Dashboard</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

  <!-- Auth screen -->
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-card">
      <div class="auth-logo">Homeboard</div>
      <div class="auth-tagline">Your family, organised.</div>

      <div id="authLogin">
        <h2 class="auth-title">Sign in</h2>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••">
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button class="btn primary full-width" id="loginBtn" onclick="Auth.signIn()">Sign in</button>
        <p class="auth-switch">No account? <a href="#" onclick="Auth.showRegister()">Create one</a></p>
      </div>

      <div id="authRegister" class="hidden">
        <h2 class="auth-title">Create account</h2>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="regEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="At least 8 characters">
        </div>
        <div id="registerError" class="form-error hidden"></div>
        <button class="btn primary full-width" onclick="Auth.signUp()">Create account</button>
        <p class="auth-switch">Have an account? <a href="#" onclick="Auth.showLogin()">Sign in</a></p>
      </div>

      <div id="authSetup" class="hidden">
        <h2 class="auth-title">Set up your family</h2>
        <div id="setupJoinToggle" class="mode-toggle" style="margin-bottom:16px">
          <button class="mode-btn active" id="setupCreateBtn" onclick="Auth.showSetupCreate()">Create family</button>
          <button class="mode-btn" id="setupJoinBtn" onclick="Auth.showSetupJoin()">Join family</button>
        </div>

        <div id="setupCreate">
          <div class="form-group">
            <label class="form-label">Family name</label>
            <input type="text" class="form-input" id="setupFamilyName" placeholder="e.g. The Richardson Family">
          </div>
          <div class="form-group">
            <label class="form-label">Your name</label>
            <input type="text" class="form-input" id="setupDisplayName" placeholder="e.g. Jeff">
          </div>
          <div class="form-group">
            <label class="form-label">Your role</label>
            <select class="form-input" id="setupRole">
              <option value="parent">Parent</option>
              <option value="child">Child</option>
            </select>
          </div>
          <div id="setupError" class="form-error hidden"></div>
          <button class="btn primary full-width" onclick="Auth.setupFamily()">Continue</button>
        </div>

        <div id="setupJoin" class="hidden">
          <div class="form-group">
            <label class="form-label">Family ID</label>
            <input type="text" class="form-input" id="joinFamilyId" placeholder="Paste the family ID">
          </div>
          <div class="form-group">
            <label class="form-label">Your name</label>
            <input type="text" class="form-input" id="joinDisplayName" placeholder="e.g. Sarah">
          </div>
          <div class="form-group">
            <label class="form-label">Your role</label>
            <select class="form-input" id="joinRole">
              <option value="parent">Parent</option>
              <option value="child">Child</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Invite code (if required)</label>
            <input type="text" class="form-input" id="joinInviteCode" placeholder="Optional">
          </div>
          <div id="joinError" class="form-error hidden"></div>
          <button class="btn primary full-width" onclick="Auth.joinFamily()">Join family</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="appScreen" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">Homeboard<span id="familyNameDisplay"></span></div>
      </div>
      <div class="mode-toggle" style="margin:12px 16px">
        <button class="mode-btn active" id="parentModeBtn" onclick="App.setMode('parent')">⊕ Parents</button>
        <button class="mode-btn" id="childModeBtn" onclick="App.setMode('child')">
          <span id="childModeLabel">Child</span>
        </button>
      </div>
      <nav class="nav-section">
        <div class="nav-label">Modules</div>
        <button class="nav-item active" onclick="App.showSection('calendar', this)">
          <span class="nav-icon">📅</span> Calendar
        </button>
        <button class="nav-item" onclick="App.showSection('recipes', this)">
          <span class="nav-icon">🍳</span> Recipes
        </button>
      </nav>
      <div class="family-members-panel">
        <div class="family-label">Family</div>
        <div id="membersList"></div>
        <button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="App.showFamilyInfo()">
          Manage family
        </button>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-sm" style="width:100%" onclick="Auth.signOut()">Sign out</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-title" id="topbarTitle">Calendar</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <div class="content" id="mainContent">
        <div class="loading-state">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="modalBackdrop" onclick="Modal.closeOnBackdrop(event)">
    <div class="modal" id="modalBox"></div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/calendar.js"></script>
  <script src="/js/recipes.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
